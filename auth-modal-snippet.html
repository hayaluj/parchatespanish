<!-- ============================================================
  AUTH MODAL — paste this into your index.html
  
  1. Add the CSS to your <style> block
  2. Add the HTML before </body>
  3. Add the script block before </body>
  4. Add a "Log in" button to your nav that calls: openAuthModal()
  ============================================================ -->


<!-- ── ADD TO YOUR NAV ─────────────────────────────────────── -->
<!--
  Find your nav in index.html and add this button:

  <button onclick="openAuthModal()" class="nav-auth-btn">Log in</button>
  
  Or if user is logged in, show dashboard link instead (handled by the script below).
-->


<!-- ── CSS — add inside your <style> block ─────────────────── -->
<style id="auth-modal-styles">
.nav-auth-btn {
  padding: 0.5rem 1.25rem;
  background: var(--green, #1e5c3f);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.nav-auth-btn:hover { background: #164830; }
.nav-auth-btn.signed-in { background: transparent; color: var(--green, #1e5c3f); border: 1.5px solid var(--green, #1e5c3f); }

/* Overlay */
.auth-modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.auth-modal-overlay.open { opacity: 1; pointer-events: all; }

/* Card */
.auth-modal-card {
  background: white;
  border-radius: 20px;
  padding: 2.5rem 2.25rem;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  transform: translateY(16px) scale(0.97);
  transition: transform 0.25s;
  position: relative;
}
.auth-modal-overlay.open .auth-modal-card { transform: translateY(0) scale(1); }

.modal-close {
  position: absolute; top: 1.1rem; right: 1.1rem;
  background: none; border: none; font-size: 1.4rem;
  color: #aaa; cursor: pointer; line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: #555; }

.modal-header { text-align: center; margin-bottom: 1.75rem; }
.modal-header .flag { font-size: 2rem; margin-bottom: 0.4rem; }
.modal-header h2 { font-family: 'Fraunces', serif; font-size: 1.6rem; color: #1e5c3f; margin-bottom: 0.3rem; }
.modal-header p { color: #777; font-size: 0.9rem; }

.modal-tabs {
  display: flex; background: #ede6d6; border-radius: 9px;
  padding: 4px; margin-bottom: 1.5rem; gap: 4px;
}
.modal-tab {
  flex: 1; padding: 0.55rem; border: none; border-radius: 6px;
  background: transparent; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.88rem; font-weight: 500; color: #777; cursor: pointer;
  transition: all 0.2s;
}
.modal-tab.active { background: white; color: #1e5c3f; font-weight: 600; box-shadow: 0 1px 5px rgba(0,0,0,0.08); }

.modal-panel { display: none; }
.modal-panel.active { display: block; }

.modal-form-group { margin-bottom: 1rem; }
.modal-form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.35rem; }
.modal-form-group input {
  width: 100%; padding: 0.7rem 0.9rem;
  border: 1.5px solid #d5cfc3; border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem;
  color: #1a1a1a; background: #fafaf8; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.modal-form-group input:focus {
  border-color: #1e5c3f;
  box-shadow: 0 0 0 3px rgba(30,92,63,0.1);
  background: white;
}
.modal-forgot { display: block; text-align: right; font-size: 0.8rem; color: #d4621a; text-decoration: none; margin-top: 0.25rem; }
.modal-forgot:hover { text-decoration: underline; }

.modal-btn-primary {
  width: 100%; padding: 0.8rem;
  background: #1e5c3f; color: white; border: none;
  border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s; margin-top: 0.25rem;
}
.modal-btn-primary:hover { background: #164830; }
.modal-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.modal-divider {
  display: flex; align-items: center; gap: 0.6rem;
  margin: 1rem 0; color: #aaa; font-size: 0.8rem;
}
.modal-divider::before, .modal-divider::after {
  content: ''; flex: 1; height: 1px; background: #e0d9ce;
}

.modal-btn-google {
  width: 100%; padding: 0.75rem;
  background: white; color: #1a1a1a;
  border: 1.5px solid #d5cfc3; border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem;
  font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.55rem;
  transition: border-color 0.2s, background 0.2s;
}
.modal-btn-google:hover { background: #f8f8f6; border-color: #aaa; }

.modal-msg {
  padding: 0.65rem 0.9rem; border-radius: 7px;
  font-size: 0.85rem; margin-bottom: 0.9rem; display: none;
}
.modal-msg.error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c2; display: block; }
.modal-msg.success { background: #e8f5ee; color: #1e5c3f; border: 1px solid #b8dfc9; display: block; }

/* Forgot password panel inside modal */
.modal-back-btn {
  background: none; border: none; color: #d4621a;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem;
  font-weight: 500; cursor: pointer; padding: 0; margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 0.3rem;
}
.modal-back-btn:hover { text-decoration: underline; }
</style>


<!-- ── HTML — paste before </body> ─────────────────────────── -->
<div class="auth-modal-overlay" id="authModal" onclick="handleOverlayClick(event)">
  <div class="auth-modal-card">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>

    <!-- Main login/signup view -->
    <div id="modal-main">
      <div class="modal-header">
        <div class="flag">🇨🇴</div>
        <h2>Student portal</h2>
        <p>Log in or create your free account</p>
      </div>

      <div class="modal-tabs">
        <button class="modal-tab active" onclick="modalSwitchTab('login', event)">Log in</button>
        <button class="modal-tab" onclick="modalSwitchTab('signup', event)">Sign up</button>
      </div>

      <div id="modal-msg" class="modal-msg"></div>

      <!-- LOGIN -->
      <div id="modal-panel-login" class="modal-panel active">
        <div class="modal-form-group">
          <label>Email</label>
          <input type="email" id="m-login-email" placeholder="you@email.com">
        </div>
        <div class="modal-form-group">
          <label>Password</label>
          <input type="password" id="m-login-password" placeholder="••••••••">
          <a href="#" class="modal-forgot" onclick="modalShowForgot(event)">Forgot password?</a>
        </div>
        <button class="modal-btn-primary" id="m-btn-login" onclick="modalLogin()">Log in</button>
        <div class="modal-divider">or</div>
        <button class="modal-btn-google" onclick="modalGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- SIGN UP -->
      <div id="modal-panel-signup" class="modal-panel">
        <div class="modal-form-group">
          <label>Full name</label>
          <input type="text" id="m-signup-name" placeholder="Your name">
        </div>
        <div class="modal-form-group">
          <label>Email</label>
          <input type="email" id="m-signup-email" placeholder="you@email.com">
        </div>
        <div class="modal-form-group">
          <label>Password</label>
          <input type="password" id="m-signup-password" placeholder="Min. 8 characters">
        </div>
        <button class="modal-btn-primary" id="m-btn-signup" onclick="modalSignup()">Create account</button>
        <div class="modal-divider">or</div>
        <button class="modal-btn-google" onclick="modalGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/></svg>
          Continue with Google
        </button>
      </div>
    </div>

    <!-- Forgot password view -->
    <div id="modal-forgot" style="display:none">
      <button class="modal-back-btn" onclick="modalShowMain()">← Back to login</button>
      <div class="modal-header" style="text-align:left;margin-bottom:.5rem">
        <h2 style="font-size:1.4rem">Reset password</h2>
      </div>
      <p style="color:#777;font-size:.88rem;margin-bottom:1.25rem;line-height:1.6">
        Enter your email and we'll send you a reset link.
      </p>
      <div id="modal-msg-forgot" class="modal-msg"></div>
      <div class="modal-form-group">
        <label>Email</label>
        <input type="email" id="m-forgot-email" placeholder="you@email.com">
      </div>
      <button class="modal-btn-primary" id="m-btn-forgot" onclick="modalForgot()">Send reset link</button>
    </div>
  </div>
</div>


<!-- ── SCRIPT — paste before </body> ───────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  // ── Config ────────────────────────────────────────────────
  const SUPABASE_URL = 'https://xqtpqhjddxalnhrkbnnn.supabase.co';  
  const SUPABASE_ANON_KEY = 'sb_publishable_0y6Hw4J6ECitfSRVa6Krsg_SHcB_aJR';               
  const DASHBOARD_URL = '/dashboard.html';
  // ──────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Update nav button based on auth state
  sb.auth.getSession().then(({ data }) => {
    const btn = document.querySelector('.nav-auth-btn');
    if (!btn) return;
    if (data.session) {
      btn.textContent = 'My account';
      btn.classList.add('signed-in');
      btn.onclick = () => window.location.href = DASHBOARD_URL;
    }
  });

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) window.location.href = DASHBOARD_URL;
  });

  window.openAuthModal = function() {
    document.getElementById('authModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeAuthModal = function() {
    document.getElementById('authModal').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.handleOverlayClick = function(e) {
    if (e.target === document.getElementById('authModal')) closeAuthModal();
  };

  window.modalSwitchTab = function(tab, e) {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('modal-panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('modal-panel-signup').classList.toggle('active', tab === 'signup');
    setModalMsg('', '');
  };

  window.modalShowForgot = function(e) {
    e.preventDefault();
    document.getElementById('modal-main').style.display = 'none';
    document.getElementById('modal-forgot').style.display = 'block';
    const email = document.getElementById('m-login-email').value;
    if (email) document.getElementById('m-forgot-email').value = email;
  };

  window.modalShowMain = function() {
    document.getElementById('modal-main').style.display = 'block';
    document.getElementById('modal-forgot').style.display = 'none';
    setForgotMsg('', '');
  };

  function setModalMsg(type, text) {
    const el = document.getElementById('modal-msg');
    el.className = 'modal-msg' + (type ? ' ' + type : '');
    el.textContent = text;
  }

  function setForgotMsg(type, text) {
    const el = document.getElementById('modal-msg-forgot');
    el.className = 'modal-msg' + (type ? ' ' + type : '');
    el.textContent = text;
  }

  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait...' : label;
  }

  window.modalLogin = async function() {
    const email = document.getElementById('m-login-email').value.trim();
    const password = document.getElementById('m-login-password').value;
    if (!email || !password) return setModalMsg('error', 'Please fill in all fields.');
    setLoading('m-btn-login', true, 'Log in');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('m-btn-login', false, 'Log in');
    if (error) return setModalMsg('error', error.message);
    window.location.href = DASHBOARD_URL;
  };

  window.modalSignup = async function() {
    const name = document.getElementById('m-signup-name').value.trim();
    const email = document.getElementById('m-signup-email').value.trim();
    const password = document.getElementById('m-signup-password').value;
    if (!name || !email || !password) return setModalMsg('error', 'Please fill in all fields.');
    if (password.length < 8) return setModalMsg('error', 'Password must be at least 8 characters.');
    setLoading('m-btn-signup', true, 'Create account');
    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    setLoading('m-btn-signup', false, 'Create account');
    if (error) return setModalMsg('error', error.message);
    setModalMsg('success', 'Account created! Check your email to confirm, then log in.');
  };

  window.modalGoogle = async function() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + DASHBOARD_URL }
    });
    if (error) setModalMsg('error', error.message);
  };

  window.modalForgot = async function() {
    const email = document.getElementById('m-forgot-email').value.trim();
    if (!email) return setForgotMsg('error', 'Please enter your email.');
    setLoading('m-btn-forgot', true, 'Send reset link');
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });
    setLoading('m-btn-forgot', false, 'Send reset link');
    if (error) return setForgotMsg('error', error.message);
    setForgotMsg('success', 'Reset link sent! Check your inbox.');
  };

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeAuthModal();
  });
})();
</script>
