<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Parcháte en Spanish</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ede6d6; min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 1.2rem 2.5rem; border-bottom: 1px solid #d5cfc3; display: flex; align-items: center; }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; color: #1e5c3f; text-decoration: none; font-weight: 700; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card { background: white; border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
    h1 { font-family: 'Fraunces', serif; font-size: 1.75rem; color: #1e5c3f; margin-bottom: 0.4rem; }
    p { color: #777; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #d5cfc3; border-radius: 9px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; outline: none; margin-bottom: 1rem; background: #fafaf8; }
    input:focus { border-color: #1e5c3f; background: white; }
    button { width: 100%; padding: 0.85rem; background: #1e5c3f; color: white; border: none; border-radius: 9px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #164830; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { padding: 0.75rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c2; display: block; }
    .msg.success { background: #e8f5ee; color: #1e5c3f; border: 1px solid #b8dfc9; display: block; }
    .back-link { display: block; text-align: center; margin-top: 1.25rem; color: #d4621a; font-size: 0.88rem; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav><a href="/" class="nav-logo">Parcháte en Spanish</a></nav>
  <main>
    <div class="card">
      <h1>New password</h1>
      <p>Choose a strong password for your account.</p>
      <div id="msg" class="msg"></div>
      <div id="form-section">
        <label>New password</label>
        <input type="password" id="pw1" placeholder="Min. 8 characters" autocomplete="new-password">
        <label>Confirm password</label>
        <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password">
        <button id="btn" onclick="handleReset()">Set new password</button>
      </div>
      <a href="/login.html" class="back-link">Back to login</a>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      'https://xqtpqhjddxalnhrkbnnn.supabase.co',
      'sb_publishable_0y6Hw4J6ECitfSRVa6Krsg_SHcB_aJR'
    );
    async function handleReset() {
      const pw = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      if (pw.length < 8) { msg.className='msg error'; msg.textContent='Min. 8 characters.'; return; }
      if (pw !== pw2) { msg.className='msg error'; msg.textContent='Passwords do not match.'; return; }
      btn.disabled = true; btn.textContent = 'Saving...';
      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) { msg.className='msg error'; msg.textContent=error.message; btn.disabled=false; btn.textContent='Set new password'; return; }
      msg.className='msg success'; msg.textContent='Password updated! Redirecting...';
      document.getElementById('form-section').style.opacity = '0.4';
      setTimeout(() => window.location.href = '/dashboard.html', 2000);
    }
  </script>
</body>
</html>
